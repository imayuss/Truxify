name: Remove Links from Non-Contributors

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  pull_request_target:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  remove-links:
    name: Remove Unwanted Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Remove links posted by non-contributors
        uses: actions/github-script@v7
        with:
          script: |
            const cleaner = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/remove-non-contributor-links.js`);
            await cleaner.run({
              github,
              context,
              core
            });
